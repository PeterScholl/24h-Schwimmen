<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Bahnenschwimmen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" type="text/css" media="screen" href="main.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='all.min.css') }}" />
  <style>:root { --swimmer-card-width: calc({{card_font_size}} * 40px); }</style>
</head>

<body>

  <header>
    <!-- Info-Zeile (togglebar) -->
    <div id="infoBar" style="display: flex">
      <span id="serverStatus" style="display: inline-block; text-align: left">
        <span
          style="height: 10px; width: 10px; background-color: green; border-radius: 50%; display: inline-block; margin-right: 5px">
        </span>
        Verbunden
      </span>
      <span style="display: inline-block; text-align: center"> Angemeldet als: <strong>{{userrealname}}
          ({{username}})</strong></span>
      <span style="display: inline-block; text-align: right"> Client-ID: <strong>{{clientID}}</strong></span>
    </div>

    <!-- Header-Inhalt -->
    <div id="header">
      <!-- Linke Schaltfläche (z.B. für Schwimmer hinzufügen) -->
      <button id="schwimmerHinzufuegen"
        style="font-size: 30px; cursor: pointer; color: white; background: none; border: none">+</button>

      <!-- Zentrierter Titel -->
      <div
        style="display: flex;flex-direction: column;position: absolute; left: 50%; transform: translateX(-50%); font-size: 24px; color: white; text-align: center;">
        <h1 id="mainHeading">24h&nbsp;Schwimmen</h1>
        <div class="form-group">
          <label for="bahnen" style="font-size: 0.7em;">Bahn(en):</label>
          <input type="text" value="{{clientID}}" id="bahnen" style="width: 10ch;" /><br />
        </div>
      </div>

      <!-- Rechte Schaltflächen -->
      <div style="display: flex; align-items: center; gap: 6px;">
        <button id="sendenBtn" title="Ausgewählte Bahnen senden"
          style="font-size: 16px; cursor: pointer; background: #2e7d32; color: white; border: none; border-radius: 6px; padding: 6px 12px; opacity: 0.45;">
          Senden&nbsp;<span id="sendenCount"
            style="background: white; color: #2e7d32; border-radius: 50%; display: inline-block; min-width: 1.4em; font-weight: bold; line-height: 1.4em;">0</span>
        </button>
        <button id="downloadJsonBtn"
          style="font-size: 30px; cursor: pointer; color: white; background: none; border: none">
          <i class="fa-solid fa-download"></i>
        </button>
        <button id="toggleInfoBar"
          style="padding-left: 0px; font-size: 30px; cursor: pointer; color: white; background: none; border: none">
          <i class="fa-solid fa-circle-info"></i>
        </button>
      </div>
    </div>
  </header>

  <main style="padding-bottom: 60px">
    <div id="container"></div>
    <p id="antwort"></p>

    <!-- Kontextmenü -->
    <div id="contextMenu">
      <ul>
        <li id="rundeAbziehenOption">Runde abziehen</li>
        <li id="deleteSwimmer">Schwimmer*innen entfernen</li>
        <li id="nurEigene">Fremdbahnen entfernen</li>
      </ul>
    </div>
  </main>
  <footer style="display: flex; justify-content: space-between; align-items: center; padding: 10px">
    {% if user_role == 'admin' %}
    <!-- Admin/Nutzer-Wechsel -->
    <form action="/admin" method="post">
      <button type="submit" title="Adminbereich"
        style="font-size: 30px; color: inherit; background: none; border: none; cursor: pointer">⚙️</button>
    </form>
    {% endif %}

    <!-- Zentrierter Text -->
    <div style="position: absolute; left: 50%; transform: translateX(-50%)">&copy; 2025 Schwimmen 24h. Alle Rechte
      vorbehalten.</div>

    <!-- Logout -->
    <form action="/logout" method="post" style="margin-left: auto">
      <button type="submit" title="Logout"
        style="font-size: 30px; color: inherit; background: none; border: none; cursor: pointer"><i
          class="fa-solid fa-right-from-bracket"></i>
      </button>
    </form>
  </footer>
  <script type="module" src="./main_v2.js"></script>

  {% if debugfunktion %}
  <script>
    // ================================================================
    //  DEBUG-KONFIGURATION
    //  Auslösen: Klick auf "24h Schwimmen" im Header oder Strg+D
    // ================================================================
    const DEBUG_CONFIG = {
      // Takt-Intervall in Millisekunden (Basis aller Zeitangaben unten)
      tickMs: 1000,

      // Wahrscheinlichkeit (0.0–1.0), dass pro Tick ein zufälliger
      // Schwimmer angeklickt (ausgewählt/abgewählt) wird
      klickWahrscheinlichkeit: 0.6,

      // Alle N Ticks wird der Senden-Button ausgelöst
      sendenIntervallTicks: 15,

      // Alle N Ticks wird ein neuer Zufalls-Schwimmer hinzugefügt
      hinzufuegenIntervallTicks: 8,

      // Zufallsnummern für neue Schwimmer: von 0 bis (max - 1)
      schwimmerNrMax: 1000,

      // Ab dieser Anzahl an Schwimmern wird pro Tick zufällig
      // einer entfernt, bis die Anzahl wieder darunter liegt
      maxSchwimmer: 25,
    };
    // ================================================================

    let debugTimer = null;
    let debugTick = 0;

    function debugStep() {
      debugTick++;
      const container = document.getElementById('container');
      const schwimmerDivs = container.querySelectorAll('.schwimmer');

      // Zufälligen Schwimmer auswählen / abwählen
      if (schwimmerDivs.length > 0 && Math.random() < DEBUG_CONFIG.klickWahrscheinlichkeit) {
        const randomDiv = schwimmerDivs[Math.floor(Math.random() * schwimmerDivs.length)];
        randomDiv.click();
      }

      // Senden-Button auslösen
      if (debugTick % DEBUG_CONFIG.sendenIntervallTicks === 0) {
        document.getElementById('sendenBtn').click();
      }

      // Neuen Zufalls-Schwimmer hinzufügen
      if (debugTick % DEBUG_CONFIG.hinzufuegenIntervallTicks === 0 && window.debugSchwimmerHinzufuegen) {
        const nr = Math.floor(Math.random() * DEBUG_CONFIG.schwimmerNrMax);
        window.debugSchwimmerHinzufuegen(nr);
        console.log('Debug: Schwimmer', nr, 'hinzugefügt');
      }

      // Obergrenze: zufälligen Schwimmer entfernen wenn Liste zu lang
      if (schwimmerDivs.length > DEBUG_CONFIG.maxSchwimmer && window.debugSchwimmerEntfernen) {
        window.debugSchwimmerEntfernen();
      }
    }

    function toggleDebugTimer() {
      if (debugTimer) {
        clearInterval(debugTimer);
        debugTimer = null;
        document.getElementById("mainHeading").style.color = "";
        console.log('Debug timer stopped');
      } else {
        debugTick = 0;
        debugTimer = setInterval(debugStep, DEBUG_CONFIG.tickMs);
        document.getElementById("mainHeading").style.color = "green";
        console.log('Debug timer started');
      }
    }

    document.getElementById("mainHeading").addEventListener("click", () => toggleDebugTimer());

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'd') {
        e.preventDefault();
        toggleDebugTimer();
      }
    });
  </script>
  {% endif %}
</body>

</html>

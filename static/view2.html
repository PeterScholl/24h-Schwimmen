<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Ergebnisse v2 - 24h Schwimmen</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        box-sizing: border-box;
        height: 100vh;
        padding-bottom: 2rem;
        background-color: #f8f8fd;
        margin: 0;
        overflow: hidden;
      }

      .footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 1.5rem;
        padding: 0.2rem 1rem;
        background-color: #222;
        color: white;
        font-size: 0.9rem;
        text-align: center;
        z-index: 1000;
      }

      #root {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .left,
      .right {
        padding: 1rem;
      }

      .left {
        width: 70%;
        border-right: 1px solid #ccc;
        font-size: var(--font-size, 16px);
        /* kein overflow-y: auto – Pagination übernimmt */
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .right {
        width: 30%;
        font-size: var(--font-size, 16px);
        background: #f5f5f5;
        overflow-y: auto;
        min-height: 0;
      }

      .pagination-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 4px 0 6px;
        flex-shrink: 0;
      }

      .pagination-bar button {
        padding: 4px 12px;
        font-size: 1rem;
        cursor: pointer;
      }

      .pagination-bar button:disabled {
        opacity: 0.35;
        cursor: default;
      }

      .page-info {
        font-weight: bold;
        min-width: 90px;
        text-align: center;
      }

      .auto-status {
        margin-left: 8px;
        font-size: 0.85rem;
        opacity: 0.75;
      }

      .table-area {
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      td,
      th {
        padding: 4px;
        border-bottom: 1px solid #dddddd;
        border: 1px solid #e6eaff;
      }

      .left table {
        table-layout: fixed;
      }

      .left td,
      .left th {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Rang und Wert bekommen feste Breite; Name und Gruppe teilen den Rest */
      .left .col-rang  { width: 2.2em; }
      .left .col-wert  { width: 5em; }


      tbody tr:nth-child(odd) {
        background-color: #c7cafa;
      }

      tbody tr:nth-child(even) {
        background-color: #dde4ff;
      }

      select {
        margin-bottom: 1rem;
        padding: 0.5rem 1rem;
        border: 1px solid #ccc;
        border-radius: 20px;
        background-color: white;
        font-size: 1rem;
        appearance: none;
        cursor: pointer;
        transition: border-color 0.2s;
      }

      select:focus {
        border-color: #007bff;
        outline: none;
        box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.25);
      }

      .progress-bar-track {
        height: 5px;
        background: #e0e0e0;
        flex-shrink: 0;
        margin-bottom: 2px;
      }

      .progress-bar-fill {
        height: 100%;
        background: #4a90e2;
        animation: page-countdown linear forwards;
      }

      @keyframes page-countdown {
        from { width: 100%; }
        to   { width: 0%; }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script src="./react.production.min.js"></script>
    <script src="./react-dom.production.min.js"></script>
    <script src="/view2.js"></script>
  </body>
</html>
